<svg width="900" height="280" viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg">
<defs>
  <radialGradient id="g1" cx="30%" cy="40%" r="60%">
    <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.08"/>
    <stop offset="100%" stop-color="transparent"/>
  </radialGradient>
  <radialGradient id="g2" cx="75%" cy="60%" r="50%">
    <stop offset="0%" stop-color="#7b5ea7" stop-opacity="0.10"/>
    <stop offset="100%" stop-color="transparent"/>
  </radialGradient>
  <filter id="glow">
    <feGaussianBlur stdDeviation="3" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="softglow">
    <feGaussianBlur stdDeviation="6" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>

<!-- Background -->
<rect width="900" height="280" fill="#030712" rx="16"/>
<rect width="900" height="280" fill="url(#g1)" rx="16"/>
<rect width="900" height="280" fill="url(#g2)" rx="16"/>

<!-- Animated grid lines -->
<g opacity="0.04" stroke="#00d4ff" stroke-width="0.5">
  <line x1="0" y1="40" x2="900" y2="40"/>
  <line x1="0" y1="80" x2="900" y2="80"/>
  <line x1="0" y1="120" x2="900" y2="120"/>
  <line x1="0" y1="160" x2="900" y2="160"/>
  <line x1="0" y1="200" x2="900" y2="200"/>
  <line x1="0" y1="240" x2="900" y2="240"/>
  <line x1="100" y1="0" x2="100" y2="280"/>
  <line x1="200" y1="0" x2="200" y2="280"/>
  <line x1="300" y1="0" x2="300" y2="280"/>
  <line x1="400" y1="0" x2="400" y2="280"/>
  <line x1="500" y1="0" x2="500" y2="280"/>
  <line x1="600" y1="0" x2="600" y2="280"/>
  <line x1="700" y1="0" x2="700" y2="280"/>
  <line x1="800" y1="0" x2="800" y2="280"/>
</g>

<!-- Floating particles -->
<circle cx="80" cy="60" r="1.5" fill="#00d4ff" opacity="0">
  <animate attributeName="opacity" values="0;0.6;0" dur="3s" repeatCount="indefinite" begin="0s"/>
  <animate attributeName="cy" values="60;40;60" dur="3s" repeatCount="indefinite" begin="0s"/>
</circle>
<circle cx="820" cy="180" r="1" fill="#00d4ff" opacity="0">
  <animate attributeName="opacity" values="0;0.5;0" dur="4s" repeatCount="indefinite" begin="1s"/>
  <animate attributeName="cy" values="180;160;180" dur="4s" repeatCount="indefinite" begin="1s"/>
</circle>
<circle cx="450" cy="30" r="1.2" fill="#a5b4fc" opacity="0">
  <animate attributeName="opacity" values="0;0.7;0" dur="2.5s" repeatCount="indefinite" begin="0.5s"/>
</circle>
<circle cx="150" cy="220" r="1" fill="#a5b4fc" opacity="0">
  <animate attributeName="opacity" values="0;0.5;0" dur="3.5s" repeatCount="indefinite" begin="2s"/>
  <animate attributeName="cy" values="220;200;220" dur="3.5s" repeatCount="indefinite" begin="2s"/>
</circle>
<circle cx="700" cy="80" r="1.5" fill="#00d4ff" opacity="0">
  <animate attributeName="opacity" values="0;0.6;0" dur="2.8s" repeatCount="indefinite" begin="1.5s"/>
  <animate attributeName="cy" values="80;60;80" dur="2.8s" repeatCount="indefinite" begin="1.5s"/>
</circle>
<circle cx="350" cy="240" r="1" fill="#7b5ea7" opacity="0">
  <animate attributeName="opacity" values="0;0.8;0" dur="4.2s" repeatCount="indefinite" begin="0.8s"/>
</circle>
<circle cx="600" cy="140" r="1.2" fill="#00d4ff" opacity="0">
  <animate attributeName="opacity" values="0;0.4;0" dur="3.2s" repeatCount="indefinite" begin="2.5s"/>
</circle>
<circle cx="250" cy="100" r="0.8" fill="#a5b4fc" opacity="0">
  <animate attributeName="opacity" values="0;0.6;0" dur="2.2s" repeatCount="indefinite" begin="1.2s"/>
</circle>
<circle cx="760" cy="230" r="1.3" fill="#00d4ff" opacity="0">
  <animate attributeName="opacity" values="0;0.5;0" dur="3.8s" repeatCount="indefinite" begin="0.3s"/>
</circle>
<circle cx="50" cy="150" r="1" fill="#7b5ea7" opacity="0">
  <animate attributeName="opacity" values="0;0.7;0" dur="2.6s" repeatCount="indefinite" begin="3s"/>
</circle>

<!-- Corner accent lines -->
<line x1="0" y1="0" x2="60" y2="0" stroke="#00d4ff" stroke-width="1.5" opacity="0.4" rx="16"/>
<line x1="0" y1="0" x2="0" y2="60" stroke="#00d4ff" stroke-width="1.5" opacity="0.4"/>
<line x1="900" y1="280" x2="840" y2="280" stroke="#00d4ff" stroke-width="1.5" opacity="0.4"/>
<line x1="900" y1="280" x2="900" y2="220" stroke="#00d4ff" stroke-width="1.5" opacity="0.4"/>
<line x1="840" y1="0" x2="900" y2="0" stroke="#7b5ea7" stroke-width="1" opacity="0.3"/>
<line x1="900" y1="0" x2="900" y2="60" stroke="#7b5ea7" stroke-width="1" opacity="0.3"/>

<!-- Animated cyan line accent -->
<line x1="60" y1="200" x2="0" y2="200" stroke="#00d4ff" stroke-width="0.5" opacity="0">
  <animate attributeName="opacity" values="0;0.3;0" dur="4s" repeatCount="indefinite"/>
  <animate attributeName="x2" values="0;120;0" dur="4s" repeatCount="indefinite"/>
</line>

<!-- SS monogram — top left -->
<text x="52" y="78" font-family="monospace" font-size="32" font-weight="700" fill="#00d4ff" opacity="0.12" filter="url(#softglow)">SS</text>

<!-- Main name — with fade-in animation -->
<text x="450" y="118" font-family="Arial Black, sans-serif" font-size="58" font-weight="900" fill="white" text-anchor="middle" letter-spacing="-2" opacity="0" filter="url(#glow)">
  <animate attributeName="opacity" values="0;1" dur="1.2s" fill="freeze" begin="0.2s"/>
  Shivam Sharma
</text>

<!-- Cyan glow copy of name -->
<text x="450" y="118" font-family="Arial Black, sans-serif" font-size="58" font-weight="900" fill="#00d4ff" text-anchor="middle" letter-spacing="-2" opacity="0" filter="url(#softglow)">
  <animate attributeName="opacity" values="0;0.15" dur="1.5s" fill="freeze" begin="0.4s"/>
  Shivam Sharma
</text>

<!-- Subtitle -->
<text x="450" y="152" font-family="Courier New, monospace" font-size="14" fill="#4a5568" text-anchor="middle" letter-spacing="2" opacity="0">
  <animate attributeName="opacity" values="0;1" dur="1s" fill="freeze" begin="0.8s"/>
  // full-stack · web3 · ai · co-founder @ EcoInsight.AI
</text>

<!-- Animated underline -->
<line x1="450" y1="162" x2="450" y2="162" stroke="#00d4ff" stroke-width="1" opacity="0">
  <animate attributeName="x1" values="450;240" dur="0.8s" fill="freeze" begin="1.2s"/>
  <animate attributeName="x2" values="450;660" dur="0.8s" fill="freeze" begin="1.2s"/>
  <animate attributeName="opacity" values="0;0.4" dur="0.8s" fill="freeze" begin="1.2s"/>
</line>

<!-- Status pill -->
<rect x="340" y="182" width="220" height="28" rx="14" fill="rgba(0,212,255,0.06)" stroke="#00d4ff" stroke-width="0.8" stroke-opacity="0.25" opacity="0">
  <animate attributeName="opacity" values="0;1" dur="0.8s" fill="freeze" begin="1.5s"/>
</rect>
<circle cx="358" cy="196" r="4" fill="#00d4ff" opacity="0">
  <animate attributeName="opacity" values="0;1" dur="0.8s" fill="freeze" begin="1.5s"/>
  <animate attributeName="opacity" values="1;0.2;1" dur="1.5s" repeatCount="indefinite" begin="2s"/>
</circle>
<text x="450" y="201" font-family="Courier New, monospace" font-size="11" fill="#00d4ff" text-anchor="middle" letter-spacing="1.5" opacity="0">
  <animate attributeName="opacity" values="0;1" dur="0.8s" fill="freeze" begin="1.5s"/>
  LIVE · BUILDING ECOINSIGHT.AI
</text>

<!-- Bottom tags -->
<text x="450" y="248" font-family="Courier New, monospace" font-size="11" fill="#1f2937" text-anchor="middle" letter-spacing="3" opacity="0">
  <animate attributeName="opacity" values="0;1" dur="1s" fill="freeze" begin="1.8s"/>
  MERN · NEXT.JS · WEB3 · AI · DOCKER · AWS
</text>
</svg>